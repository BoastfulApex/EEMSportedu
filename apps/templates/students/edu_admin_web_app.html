<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Davomat</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="/static/face-api/face-api.js"></script>
  <style>
    :root {
      --bg:       var(--tg-theme-bg-color,         #ffffff);
      --text:     var(--tg-theme-text-color,        #1a1a2e);
      --hint:     var(--tg-theme-hint-color,        #6c757d);
      --btn:      var(--tg-theme-button-color,      #0d6efd);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --sec-bg:   var(--tg-theme-secondary-bg-color,#f0f4ff);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 32px;
    }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-size: 1.35rem; font-weight: 700; }
    .header p  { font-size: 0.8rem; color: var(--hint); margin-top: 4px; }

    /* ── Kamera ── */
    .camera-wrap {
      position: relative;
      width: 220px; height: 220px;
      border-radius: 50%;
      overflow: hidden;
      background: #111;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      margin-bottom: 20px;
    }
    .camera-wrap video {
      width: 100%; height: 100%;
      object-fit: cover;
      /* Orqa kamera uchun mirror qilinmaydi */
    }
    .camera-wrap .cam-overlay {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 3px solid var(--btn);
      pointer-events: none;
    }
    canvas { display: none; }

    /* ── Status kartochkasi ── */
    .status-card {
      background: var(--sec-bg);
      border-radius: 14px;
      padding: 12px 20px;
      width: 100%; max-width: 320px;
      min-height: 52px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
      font-size: 0.88rem;
      line-height: 1.4;
      transition: background 0.3s;
    }
    .status-card .icon { font-size: 1.4rem; flex-shrink: 0; }
    .status-card.success { background: #d4edda; }
    .status-card.error   { background: #f8d7da; }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid #ccc;
      border-top-color: var(--btn);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tugma ── */
    .btn-row { width: 100%; max-width: 320px; }
    .btn {
      width: 100%;
      padding: 17px 10px;
      border: none; border-radius: 14px;
      font-size: 1.05rem; font-weight: 600;
      cursor: pointer;
      background: var(--btn);
      color: var(--btn-text);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active   { transform: scale(0.97); opacity: 0.85; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ── Natija bloki ── */
    .result-block {
      display: none;
      width: 100%; max-width: 320px;
      background: var(--sec-bg);
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 14px;
      font-size: 0.84rem;
      line-height: 1.65;
    }
    .result-block.visible { display: block; }
    .result-block .rname  { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .result-block .late   { color: #c0392b; font-weight: 600; }
    .result-block .early  { color: #e67e22; font-weight: 600; }
    .result-block .ok     { color: #27ae60; font-weight: 600; }
  </style>
</head>
<body>

  <div class="header">
    <h1>📷 Tinglovchi davomati</h1>
    <p id="dateLabel"></p>
  </div>

  <div class="camera-wrap">
    <video id="camera" autoplay playsinline muted></video>
    <div class="cam-overlay"></div>
  </div>
  <canvas id="snapshot"></canvas>

  <div class="status-card" id="statusCard">
    <span class="icon">📷</span>
    <span class="msg" id="statusMsg">Kamera yoqilmoqda...</span>
  </div>

  <div class="btn-row">
    <button class="btn" id="actionBtn" disabled>
      📸 &nbsp;Qayd qilish
    </button>
  </div>

  <div class="result-block" id="resultBlock"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const adminId = tg.initDataUnsafe?.user?.id || null;

    const video       = document.getElementById("camera");
    const canvas      = document.getElementById("snapshot");
    const statusCard  = document.getElementById("statusCard");
    const statusMsg   = document.getElementById("statusMsg");
    const actionBtn   = document.getElementById("actionBtn");
    const resultBlock = document.getElementById("resultBlock");

    // Sana
    document.getElementById("dateLabel").textContent = new Date().toLocaleDateString("uz-UZ", {
      weekday: "long", year: "numeric", month: "long", day: "numeric"
    });

    // ── Status yordamchilari ───────────────────────────────
    function setStatus(type, icon, msg) {
      statusCard.className = "status-card " + type;
      statusCard.innerHTML = `<span class="icon">${icon}</span><span class="msg">${msg}</span>`;
    }
    function setLoading(msg) {
      statusCard.className = "status-card";
      statusCard.innerHTML = `<div class="spinner"></div><span class="msg">${msg}</span>`;
    }

    // ── Kamera (ORQA kamera) ───────────────────────────────
    async function startCamera() {
      // Avval aniq orqa kamera so'raymiz, bo'lmasa istalgan environment
      const constraints = [
        { video: { facingMode: { exact: "environment" }, width: 1280, height: 720 }, audio: false },
        { video: { facingMode: "environment" }, audio: false },
        { video: true, audio: false },
      ];

      for (const c of constraints) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia(c);
          video.srcObject = stream;
          await video.play();
          actionBtn.disabled = false;
          setStatus("", "📷", "Tinglovchining yuzini kameraga ko'rsating va tugmani bosing.");
          return;
        } catch (_) { /* keyingi variantga o'tish */ }
      }
      setStatus("error", "❌", "Kamera yoqilmadi. Brauzer kameraga ruxsat bering.");
    }

    // ── Snapshot olish ─────────────────────────────────────
    function takePhoto() {
      if (!video.videoWidth || !video.videoHeight) return null;
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      return canvas.toDataURL("image/jpeg", 0.88);
    }

    const _sleep = ms => new Promise(r => setTimeout(r, ms));

    // ══════════════════════════════════════════════════════════
    // JONLILIK TEKSHIRUVI — face-api.js: 3 marta ko'z yumish
    // ══════════════════════════════════════════════════════════

    const _L_EYE = [36, 37, 38, 39, 40, 41];
    const _R_EYE = [42, 43, 44, 45, 46, 47];
    const _EAR_CLOSE = 0.22;
    const _EAR_OPEN  = 0.28;
    const _BLINKS_REQUIRED = 3;

    const _MODEL_URL = '/static/face-api/models/';
    let _modelsReady = false;
    let _modelsLoading = null;

    async function _initFaceApi() {
      if (_modelsReady) return true;
      if (_modelsLoading) return _modelsLoading;
      if (typeof faceapi === 'undefined') {
        console.error('face-api.js yuklanmagan!');
        return false;
      }
      _modelsLoading = (async () => {
        try {
          await faceapi.nets.tinyFaceDetector.loadFromUri(_MODEL_URL);
          console.log('✓ tinyFaceDetector yuklandi');
          await faceapi.nets.faceLandmark68TinyNet.loadFromUri(_MODEL_URL);
          console.log('✓ faceLandmark68Tiny yuklandi');
          _modelsReady = true;
          return true;
        } catch (e) {
          console.error('Model yuklash xatosi:', e);
          return false;
        }
      })();
      return _modelsLoading;
    }
    _initFaceApi();

    function _dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function _ear(pts, idx) {
      return (_dist(pts[idx[1]], pts[idx[5]]) + _dist(pts[idx[2]], pts[idx[4]]))
           / (2 * _dist(pts[idx[0]], pts[idx[3]]));
    }

    async function checkLiveness(onUpdate, timeoutMs = 12000) {
      const ready = await _initFaceApi();
      if (!ready) {
        console.error('face-api modellar yuklanmadi');
        return false;
      }

      const opts = new faceapi.TinyFaceDetectorOptions({
        inputSize: 320,
        scoreThreshold: 0.3,
      });

      const deadline = Date.now() + timeoutMs;
      let blinks     = 0;
      let eyeOpen    = false;
      let eyeClosed  = false;

      while (Date.now() < deadline && blinks < _BLINKS_REQUIRED) {
        const sec = Math.ceil((deadline - Date.now()) / 1000);

        try {
          const W = video.videoWidth  || 320;
          const H = video.videoHeight || 240;
          canvas.width  = W;
          canvas.height = H;
          canvas.getContext('2d').drawImage(video, 0, 0, W, H);

          const det = await faceapi
            .detectSingleFace(canvas, opts)
            .withFaceLandmarks(true);

          if (det) {
            const pts = det.landmarks.positions;
            const ear = (_ear(pts, _L_EYE) + _ear(pts, _R_EYE)) / 2;

            if (ear > _EAR_OPEN) {
              if (eyeClosed) {
                blinks++;
                eyeClosed = false;
                if (onUpdate) onUpdate(_BLINKS_REQUIRED - blinks, sec, 'blink');
              }
              eyeOpen = true;
            } else if (ear < _EAR_CLOSE && eyeOpen) {
              eyeClosed = true;
              eyeOpen   = false;
            }

            if (onUpdate && !eyeClosed)
              onUpdate(_BLINKS_REQUIRED - blinks, sec, 'waiting');
          } else {
            if (onUpdate) onUpdate(_BLINKS_REQUIRED - blinks, sec, 'no_face');
          }
        } catch (e) { console.debug('frame xato:', e); }

        await _sleep(100);
      }

      return blinks >= _BLINKS_REQUIRED;
    }

    // ── GPS olish ──────────────────────────────────────────
    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation)
          return reject(new Error("Geolokatsiya qo'llab-quvvatlanmaydi"));
        navigator.geolocation.getCurrentPosition(
          p => resolve({ latitude: p.coords.latitude, longitude: p.coords.longitude }),
          e => reject(e),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      });
    }

    // ── Natija bloki ───────────────────────────────────────
    function showResult(data) {
      resultBlock.innerHTML = "";
      resultBlock.classList.remove("visible");

      let html = `<div class="rname">👤 ${data.student_name}</div>`;

      if (data.type === "check_in") {
        const lateMin  = data.late_minutes  || 0;
        const expStart = data.expected_start;
        html += `🔓 Kirdi: <strong>${data.time}</strong><br>`;
        if (data.location)
          html += `📍 ${data.location}` + (data.distance_meters != null ? ` (${data.distance_meters} m)` : '') + '<br>';
        if (lateMin > 0)
          html += `<span class="late">⏰ Kechikish: ${lateMin} daqiqa</span>`;
        else if (expStart)
          html += `<span class="ok">👍 O'z vaqtida (${expStart})</span>`;
      } else {
        html += `🔒 Chiqdi: <strong>${data.time}</strong><br>`;
        if (data.check_in)
          html += `🔓 Kirgan: ${data.check_in}<br>`;
        if (data.location)
          html += `📍 ${data.location}` + (data.distance_meters != null ? ` (${data.distance_meters} m)` : '') + '<br>';
        const earlyMin = data.early_leave_minutes || 0;
        if (earlyMin > 0)
          html += `<span class="early">⏰ Erta ketish: ${earlyMin} daqiqa</span>`;
      }

      resultBlock.innerHTML = html;
      resultBlock.classList.add("visible");
    }

    // ── Asosiy action ──────────────────────────────────────
    async function performCheck() {
      if (!adminId) {
        setStatus("error", "❌", "Telegram foydalanuvchi aniqlanmadi.");
        return;
      }

      actionBtn.disabled = true;
      resultBlock.classList.remove("visible");

      // ── Jonlilik tekshiruvi (3 marta ko'z yuming) ──────────
      setLoading(`👁 Tinglovchi ko'zini 3 marta yumsın... 12`);
      let isLive = false;
      try {
        isLive = await checkLiveness(
          (left, sec, status) => {
            if (status === 'no_face')
              setLoading(`😶 Tinglovchi yuzini kameraga ko'rsatsin... ${sec}`);
            else if (status === 'blink')
              setLoading(`✅ ${_BLINKS_REQUIRED - left}/${_BLINKS_REQUIRED} — davom etsin! ${sec}`);
            else
              setLoading(`👁 Ko'z yumsın (${_BLINKS_REQUIRED - left}/${_BLINKS_REQUIRED})... ${sec}`);
          },
          12000
        );
      } catch (e) {
        console.error('Liveness xato:', e);
      }
      if (!isLive) {
        setStatus("error", "❌",
          "Jonlilik tasdiqlanmadi.<br>" +
          "<small>Tinglovchi yuzini ko'rsatsin va 3 marta ko'z yumsın.</small>"
        );
        actionBtn.disabled = false;
        return;
      }

      await _sleep(200);
      const photo = takePhoto();
      if (!photo) {
        setStatus("error", "⚠️", "Kamera tayyor emas. Sahifani yangilang.");
        actionBtn.disabled = false;
        return;
      }

      setLoading("Joylashuv aniqlanmoqda...");

      let lat, lon;
      try {
        const loc = await getLocation();
        lat = loc.latitude;
        lon = loc.longitude;
      } catch (err) {
        setStatus("error", "⚠️", "Joylashuv aniqlanmadi: " + err.message);
        actionBtn.disabled = false;
        return;
      }

      setLoading("Tinglovchi aniqlanmoqda...");

      try {
        const res  = await fetch("/students/edu-admin/api/check/", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({
            admin_telegram_id: adminId,
            latitude:          lat,
            longitude:         lon,
            image:             photo,
          }),
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok && data?.status === "SUCCESS") {
          const label = data.type === "check_in" ? "Kirish qayd etildi" : "Chiqish qayd etildi";
          setStatus("success", "✅", `${label}: ${data.time}`);
          showResult(data);
          // 3 soniyadan keyin yopish
          setTimeout(() => tg.close(), 3000);
        } else {
          const reason = (data?.reason || data?.detail || "Noma'lum xato")
            .replace(/\n/g, "<br>");
          setStatus("error", "❌", reason);
          actionBtn.disabled = false;
        }

      } catch (err) {
        setStatus("error", "⚠️", "Xatolik: " + err.message);
        actionBtn.disabled = false;
      }
    }

    actionBtn.addEventListener("click", performCheck);
    startCamera();
  </script>
</body>
</html>
