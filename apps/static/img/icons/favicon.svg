<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3aaee0"/>
      <stop offset="100%" style="stop-color:#1a7fc1"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (iOS-style) -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Fingerprint icon — white strokes, centered in ~340x340 area at offset 86,76 -->
  <g fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">

    <!-- Outer arc (widest) -->
    <path d="M86,340 C86,175 160,88 256,88 C352,88 426,175 426,340"
          stroke-width="36"/>

    <!-- Second arc -->
    <path d="M136,340 C136,200 192,138 256,138 C320,138 376,200 376,340"
          stroke-width="36"/>

    <!-- Third arc -->
    <path d="M186,340 C186,230 220,188 256,188 C292,188 326,230 326,340"
          stroke-width="36"/>

    <!-- Inner teardrop (fingerprint core) -->
    <path d="M256,222
             C232,222 216,244 216,268
             C216,306 256,352 256,352
             C256,352 296,306 296,268
             C296,244 280,222 256,222 Z"
          stroke-width="34"/>

  </g>
</svg>
