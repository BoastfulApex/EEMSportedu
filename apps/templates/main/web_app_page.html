<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Davomat</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:       var(--tg-theme-bg-color,       #ffffff);
      --text:     var(--tg-theme-text-color,      #1a1a2e);
      --hint:     var(--tg-theme-hint-color,      #6c757d);
      --btn:      var(--tg-theme-button-color,    #0d6efd);
      --btn-text: var(--tg-theme-button-text-color,#ffffff);
      --sec-bg:   var(--tg-theme-secondary-bg-color, #f0f4ff);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 32px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .header p {
      font-size: 0.82rem;
      color: var(--hint);
      margin-top: 4px;
    }

    /* ── Camera ── */
    .camera-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      overflow: hidden;
      background: #111;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      margin-bottom: 20px;
    }
    .camera-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror */
    }
    .camera-wrap .cam-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid var(--btn);
      pointer-events: none;
    }
    canvas { display: none; }

    /* ── Status card ── */
    .status-card {
      background: var(--sec-bg);
      border-radius: 14px;
      padding: 12px 20px;
      width: 100%;
      max-width: 320px;
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 0.88rem;
      transition: background 0.3s;
    }
    .status-card .icon { font-size: 1.4rem; flex-shrink: 0; }
    .status-card .msg  { color: var(--text); line-height: 1.35; }

    .status-card.success { background: #d4edda; }
    .status-card.error   { background: #f8d7da; }
    .status-card.loading { background: var(--sec-bg); }

    /* ── Spinner ── */
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid #ccc;
      border-top-color: var(--btn);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }
    .btn {
      flex: 1;
      padding: 14px 10px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .btn:active { transform: scale(0.96); opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-enter {
      background: #198754;
      color: #fff;
    }
    .btn-exit {
      background: #dc3545;
      color: #fff;
    }
    .btn span.lbl { font-size: 0.72rem; font-weight: 400; opacity: 0.85; }
  </style>
</head>
<body>

  <div class="header">
    <h1>📋 Davomat tizimi</h1>
    <p id="dateLabel"></p>
  </div>

  <div class="camera-wrap">
    <video id="camera" autoplay playsinline muted></video>
    <div class="cam-overlay"></div>
  </div>
  <canvas id="snapshot"></canvas>

  <div class="status-card" id="statusCard">
    <span class="icon">📷</span>
    <span class="msg" id="statusMsg">Kamera yoqilmoqda...</span>
  </div>

  <div class="btn-row">
    <button class="btn btn-enter" id="enterBtn" disabled>
      🔓
      <span class="lbl">Kirish</span>
    </button>
    <button class="btn btn-exit" id="exitBtn" disabled>
      🔒
      <span class="lbl">Chiqish</span>
    </button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const video     = document.getElementById("camera");
    const canvas    = document.getElementById("snapshot");
    const statusCard = document.getElementById("statusCard");
    const statusMsg = document.getElementById("statusMsg");
    const enterBtn  = document.getElementById("enterBtn");
    const exitBtn   = document.getElementById("exitBtn");
    const dateLabel = document.getElementById("dateLabel");

    const user_id = tg.initDataUnsafe?.user?.id || null;

    // Sana
    const now = new Date();
    dateLabel.textContent = now.toLocaleDateString("uz-UZ", {
      weekday: "long", year: "numeric", month: "long", day: "numeric"
    });

    // Status yordamchi
    function setStatus(type, icon, msg) {
      statusCard.className = "status-card " + type;
      statusCard.innerHTML = `<span class="icon">${icon}</span><span class="msg">${msg}</span>`;
    }
    function setLoading(msg) {
      statusCard.className = "status-card loading";
      statusCard.innerHTML = `<div class="spinner"></div><span class="msg">${msg}</span>`;
    }

    // Kamera
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: 640, height: 480 },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        enterBtn.disabled = false;
        exitBtn.disabled  = false;
        setStatus("", "📷", "Tayyor. Kirish yoki chiqishni tanlang.");
      } catch (err) {
        setStatus("error", "❌", "Kamera yoqilmadi: " + err.message);
      }
    }

    function takePhoto() {
      if (!video.videoWidth || !video.videoHeight) return null;
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      return canvas.toDataURL("image/jpeg", 0.85);
    }

    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) return reject(new Error("Geolokatsiya qo'llab-quvvatlanmaydi"));
        navigator.geolocation.getCurrentPosition(
          p => resolve({ latitude: p.coords.latitude, longitude: p.coords.longitude }),
          e => reject(e),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      });
    }

    function setBtns(disabled) {
      enterBtn.disabled = disabled;
      exitBtn.disabled  = disabled;
    }

    async function performCheck(actionType) {
      if (!user_id) {
        setStatus("error", "❌", "Telegram foydalanuvchi aniqlanmadi.");
        return;
      }
      setBtns(true);
      setLoading("Joylashuv aniqlanmoqda...");

      try {
        const photo = takePhoto();
        if (!photo) {
          setStatus("error", "⚠️", "Kamera tayyor emas. Sahifani yangilang.");
          setBtns(false);
          return;
        }

        setLoading("Yuborilmoqda...");
        const { latitude, longitude } = await getLocation();

        const res = await fetch("/web_app/api/check/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_id,
            type: actionType === "enter" ? "check_in" : "check_out",
            latitude,
            longitude,
            image: photo
          })
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok && data?.status === "SUCCESS") {
          const label = actionType === "enter" ? "Kirish qayd etildi" : "Chiqish qayd etildi";
          setStatus("success", "✅", label + (data.time ? ` — ${data.time}` : ""));
          setTimeout(() => tg.close(), 2500);
        } else {
          const reason = data?.reason || data?.detail || "Noma'lum xato";
          setStatus("error", "❌", reason);
          setBtns(false);
        }
      } catch (err) {
        setStatus("error", "⚠️", "Xatolik: " + err.message);
        setBtns(false);
      }
    }

    enterBtn.addEventListener("click", () => performCheck("enter"));
    exitBtn.addEventListener("click",  () => performCheck("exit"));

    startCamera();
  </script>
</body>
</html>
