{% extends "layouts/base.html" %}
{% block title %}O'chirish{% endblock %}
{% block body_class %}dashboard{% endblock %}
{% block content %}
<div class="content-wrapper" style="max-width:440px">
  <div class="card border-0 p-4 text-center">
    <i data-feather="alert-triangle" style="width:40px;height:40px;color:#f59e0b;margin:0 auto 12px"></i>
    <h5>Smenani o'chirish</h5>
    <p class="text-muted small mb-4"><b>{{ object.name }}</b> o'chirilsinmi?</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2 justify-content-center">
        <button class="btn btn-danger btn-sm">O'chirish</button>
        <a href="{% url 'smenas_list' %}" class="btn btn-outline-secondary btn-sm">Bekor qilish</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
