<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Davomat</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="/static/face-api/face-api.js"></script>
  <style>
    :root {
      --bg:       var(--tg-theme-bg-color,         #ffffff);
      --text:     var(--tg-theme-text-color,        #1a1a2e);
      --hint:     var(--tg-theme-hint-color,        #6c757d);
      --btn:      var(--tg-theme-button-color,      #0d6efd);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
      --sec-bg:   var(--tg-theme-secondary-bg-color,#f0f4ff);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 32px;
    }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-size: 1.35rem; font-weight: 700; }
    .header p  { font-size: 0.8rem; color: var(--hint); margin-top: 4px; }

    /* ── Kamera ── */
    .camera-wrap {
      position: relative;
      width: 220px; height: 220px;
      border-radius: 50%;
      overflow: hidden;
      background: #111;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      margin-bottom: 20px;
    }
    .camera-wrap video {
      width: 100%; height: 100%;
      object-fit: cover;
      /* Orqa kamera uchun mirror qilinmaydi */
    }
    .camera-wrap .cam-overlay {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 3px solid var(--btn);
      pointer-events: none;
    }
    canvas { display: none; }

    /* ── Status kartochkasi ── */
    .status-card {
      background: var(--sec-bg);
      border-radius: 14px;
      padding: 12px 20px;
      width: 100%; max-width: 320px;
      min-height: 52px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
      font-size: 0.88rem;
      line-height: 1.4;
      transition: background 0.3s;
    }
    .status-card .icon { font-size: 1.4rem; flex-shrink: 0; }
    .status-card.success { background: #d4edda; }
    .status-card.error   { background: #f8d7da; }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid #ccc;
      border-top-color: var(--btn);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tugma ── */
    .btn-row { width: 100%; max-width: 320px; }
    .btn {
      width: 100%;
      padding: 17px 10px;
      border: none; border-radius: 14px;
      font-size: 1.05rem; font-weight: 600;
      cursor: pointer;
      background: var(--btn);
      color: var(--btn-text);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active   { transform: scale(0.97); opacity: 0.85; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ── Natija bloki ── */
    .result-block {
      display: none;
      width: 100%; max-width: 320px;
      background: var(--sec-bg);
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 14px;
      font-size: 0.84rem;
      line-height: 1.65;
    }
    .result-block.visible { display: block; }
    .result-block .rname  { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .result-block .late   { color: #c0392b; font-weight: 600; }
    .result-block .early  { color: #e67e22; font-weight: 600; }
    .result-block .ok     { color: #27ae60; font-weight: 600; }
  </style>
</head>
<body>

  <div class="header">
    <h1>📷 Tinglovchi davomati</h1>
    <p id="dateLabel"></p>
  </div>

  <div class="camera-wrap">
    <video id="camera" autoplay playsinline muted></video>
    <div class="cam-overlay"></div>
  </div>
  <canvas id="snapshot"></canvas>

  <div class="status-card" id="statusCard">
    <span class="icon">📷</span>
    <span class="msg" id="statusMsg">Kamera yoqilmoqda...</span>
  </div>

  <div class="btn-row">
    <button class="btn" id="actionBtn" disabled>
      📸 &nbsp;Qayd qilish
    </button>
  </div>

  <div class="result-block" id="resultBlock"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const adminId = tg.initDataUnsafe?.user?.id || null;

    const video       = document.getElementById("camera");
    const canvas      = document.getElementById("snapshot");
    const statusCard  = document.getElementById("statusCard");
    const statusMsg   = document.getElementById("statusMsg");
    const actionBtn   = document.getElementById("actionBtn");
    const resultBlock = document.getElementById("resultBlock");

    // Sana
    document.getElementById("dateLabel").textContent = new Date().toLocaleDateString("uz-UZ", {
      weekday: "long", year: "numeric", month: "long", day: "numeric"
    });

    // ── Status yordamchilari ───────────────────────────────
    function setStatus(type, icon, msg) {
      statusCard.className = "status-card " + type;
      statusCard.innerHTML = `<span class="icon">${icon}</span><span class="msg">${msg}</span>`;
    }
    function setLoading(msg) {
      statusCard.className = "status-card";
      statusCard.innerHTML = `<div class="spinner"></div><span class="msg">${msg}</span>`;
    }

    // ── Kamera (ORQA kamera) ───────────────────────────────
    async function startCamera() {
      // Avval aniq orqa kamera so'raymiz, bo'lmasa istalgan environment
      const constraints = [
        { video: { facingMode: { exact: "environment" }, width: 1280, height: 720 }, audio: false },
        { video: { facingMode: "environment" }, audio: false },
        { video: true, audio: false },
      ];

      for (const c of constraints) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia(c);
          video.srcObject = stream;
          await video.play();
          actionBtn.disabled = false;
          setStatus("", "📷", "Tinglovchining yuzini kameraga ko'rsating va tugmani bosing.");
          return;
        } catch (_) { /* keyingi variantga o'tish */ }
      }
      setStatus("error", "❌", "Kamera yoqilmadi. Brauzer kameraga ruxsat bering.");
    }

    // ── Snapshot olish ─────────────────────────────────────
    function takePhoto() {
      if (!video.videoWidth || !video.videoHeight) return null;
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      return canvas.toDataURL("image/jpeg", 0.88);
    }

    const _sleep = ms => new Promise(r => setTimeout(r, ms));

    // ── face-api.js — ko'z yumilishi aniqlash (EAR) ───────────
    // 68-point tiny model: chap ko'z [36-41], o'ng ko'z [42-47]
    const _L68 = [36, 37, 38, 39, 40, 41];
    const _R68 = [42, 43, 44, 45, 46, 47];
    const _EAR_CLOSE = 0.20;
    const _EAR_OPEN  = 0.25;

    const _MODEL_URL = '/static/face-api/models/';
    let _modelsReady   = false;
    let _modelsPromise = null;

    function _loadModels() {
      if (_modelsReady) return Promise.resolve(true);
      if (_modelsPromise) return _modelsPromise;
      if (typeof faceapi === 'undefined') return Promise.resolve(false);
      _modelsPromise = Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(_MODEL_URL),
        faceapi.nets.faceLandmark68TinyNet.loadFromUri(_MODEL_URL),
      ]).then(() => { _modelsReady = true; return true; })
        .catch(e => { console.warn('face-api modeli yuklanmadi:', e); return false; });
      return _modelsPromise;
    }

    // Sahifa ochilganda yuklay boshlash
    _loadModels();

    function _dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function _earPos(pos, idx) {
      return (_dist(pos[idx[1]], pos[idx[5]]) + _dist(pos[idx[2]], pos[idx[4]]))
           / (2 * _dist(pos[idx[0]], pos[idx[3]]));
    }

    async function waitForBlink(onTick, timeoutMs = 6000) {
      const ready = await _loadModels();
      if (!ready || typeof faceapi === 'undefined') {
        return _blinkFallback(onTick, timeoutMs);
      }

      return new Promise(resolve => {
        let eyeWasOpen = false, eyeBlinking = false, running = true;
        const opts     = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.4 });
        const deadline = Date.now() + timeoutMs;

        const tick = setInterval(() => {
          const left = Math.ceil((deadline - Date.now()) / 1000);
          if (onTick) onTick(Math.max(0, left));
          if (!running) clearInterval(tick);
        }, 500);

        const loop = async () => {
          if (!running) return;
          try {
            const det = await faceapi.detectSingleFace(video, opts).withFaceLandmarks(true);
            if (det) {
              const pos = det.landmarks.positions;
              const ear = (_earPos(pos, _L68) + _earPos(pos, _R68)) / 2;
              if (!eyeBlinking && eyeWasOpen && ear < _EAR_CLOSE) {
                eyeBlinking = true;
              }
              if (eyeBlinking && ear > _EAR_OPEN) {
                running = false;
                clearInterval(tick);
                resolve(true);
                return;
              }
              eyeWasOpen = ear > _EAR_OPEN;
            }
          } catch (_) {}

          if (Date.now() < deadline) {
            setTimeout(loop, 100);
          } else {
            running = false;
            clearInterval(tick);
            resolve(false);
          }
        };
        loop();
      });
    }

    async function _blinkFallback(onTick, timeoutMs) {
      const THRESHOLD = 5.0;
      const ctx = canvas.getContext("2d");
      const W = canvas.width  = video.videoWidth  || 320;
      const H = canvas.height = video.videoHeight || 240;
      const rx = Math.floor(W*0.25), ry = Math.floor(H*0.15);
      const rw = Math.floor(W*0.50), rh = Math.floor(H*0.60);
      const deadline = Date.now() + timeoutMs;
      let prev = null;
      while (Date.now() < deadline) {
        ctx.drawImage(video, 0, 0, W, H);
        const cur = ctx.getImageData(rx, ry, rw, rh);
        if (prev) {
          const d1 = prev.data, d2 = cur.data;
          let diff = 0;
          const n = Math.floor(d1.length / 32);
          for (let i = 0; i < d1.length; i += 32)
            diff += Math.abs(d1[i]-d2[i]) + Math.abs(d1[i+1]-d2[i+1]) + Math.abs(d1[i+2]-d2[i+2]);
          if (diff / (n * 3) >= THRESHOLD) return true;
        }
        prev = cur;
        if (onTick) onTick(Math.ceil((deadline - Date.now()) / 1000));
        await _sleep(300);
      }
      return false;
    }

    // ── GPS olish ──────────────────────────────────────────
    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation)
          return reject(new Error("Geolokatsiya qo'llab-quvvatlanmaydi"));
        navigator.geolocation.getCurrentPosition(
          p => resolve({ latitude: p.coords.latitude, longitude: p.coords.longitude }),
          e => reject(e),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      });
    }

    // ── Natija bloki ───────────────────────────────────────
    function showResult(data) {
      resultBlock.innerHTML = "";
      resultBlock.classList.remove("visible");

      let html = `<div class="rname">👤 ${data.student_name}</div>`;

      if (data.type === "check_in") {
        const lateMin  = data.late_minutes  || 0;
        const expStart = data.expected_start;
        html += `🔓 Kirdi: <strong>${data.time}</strong><br>`;
        if (data.location)
          html += `📍 ${data.location}` + (data.distance_meters != null ? ` (${data.distance_meters} m)` : '') + '<br>';
        if (lateMin > 0)
          html += `<span class="late">⏰ Kechikish: ${lateMin} daqiqa</span>`;
        else if (expStart)
          html += `<span class="ok">👍 O'z vaqtida (${expStart})</span>`;
      } else {
        html += `🔒 Chiqdi: <strong>${data.time}</strong><br>`;
        if (data.check_in)
          html += `🔓 Kirgan: ${data.check_in}<br>`;
        if (data.location)
          html += `📍 ${data.location}` + (data.distance_meters != null ? ` (${data.distance_meters} m)` : '') + '<br>';
        const earlyMin = data.early_leave_minutes || 0;
        if (earlyMin > 0)
          html += `<span class="early">⏰ Erta ketish: ${earlyMin} daqiqa</span>`;
      }

      resultBlock.innerHTML = html;
      resultBlock.classList.add("visible");
    }

    // ── Asosiy action ──────────────────────────────────────
    async function performCheck() {
      if (!adminId) {
        setStatus("error", "❌", "Telegram foydalanuvchi aniqlanmadi.");
        return;
      }

      actionBtn.disabled = true;
      resultBlock.classList.remove("visible");

      // ── Liveness tekshiruvi (ko'z yumilishi) ────────────────
      setLoading("👁 Tinglovchi ko'z yumsın... 6");
      const isLive = await waitForBlink(
        sec => setLoading(`👁 Tinglovchi ko'z yumsın... ${sec}`),
        6000
      );
      if (!isLive) {
        setStatus("error", "❌",
          "Ko'z yumilishi aniqlanmadi.<br>" +
          "<small>Tinglovchining haqiqiy yuzini ko'rsating va ko'z yumsın.</small>"
        );
        actionBtn.disabled = false;
        return;
      }

      // Ko'z to'liq ochilishi uchun qisqa pauza, keyin rasm ol
      await _sleep(250);
      const photo = takePhoto();
      if (!photo) {
        setStatus("error", "⚠️", "Kamera tayyor emas. Sahifani yangilang.");
        actionBtn.disabled = false;
        return;
      }

      setLoading("Joylashuv aniqlanmoqda...");

      let lat, lon;
      try {
        const loc = await getLocation();
        lat = loc.latitude;
        lon = loc.longitude;
      } catch (err) {
        setStatus("error", "⚠️", "Joylashuv aniqlanmadi: " + err.message);
        actionBtn.disabled = false;
        return;
      }

      setLoading("Tinglovchi aniqlanmoqda...");

      try {
        const res  = await fetch("/students/edu-admin/api/check/", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({
            admin_telegram_id: adminId,
            latitude:          lat,
            longitude:         lon,
            image:             photo,
          }),
        });

        const data = await res.json().catch(() => ({}));

        if (res.ok && data?.status === "SUCCESS") {
          const label = data.type === "check_in" ? "Kirish qayd etildi" : "Chiqish qayd etildi";
          setStatus("success", "✅", `${label}: ${data.time}`);
          showResult(data);
          // 3 soniyadan keyin yopish
          setTimeout(() => tg.close(), 3000);
        } else {
          const reason = (data?.reason || data?.detail || "Noma'lum xato")
            .replace(/\n/g, "<br>");
          setStatus("error", "❌", reason);
          actionBtn.disabled = false;
        }

      } catch (err) {
        setStatus("error", "⚠️", "Xatolik: " + err.message);
        actionBtn.disabled = false;
      }
    }

    actionBtn.addEventListener("click", performCheck);
    startCamera();
  </script>
</body>
</html>
