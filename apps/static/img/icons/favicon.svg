        fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Center vertical drop line -->
  <line x1="16" y1="16" x2="16" y2="27"
        stroke="white" stroke-width="2.4" stroke-linecap="round"/>
</svg>
